# Firebase App Hosting config for Snail Mail Admin.
# See https://firebase.google.com/docs/app-hosting/configure
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

env:
  - variable: FIREBASE_STORAGE_BUCKET
    value: snailmail-app.firebasestorage.app
    availability:
      - RUNTIME

  # Optional: only needed if the App Hosting runtime service account cannot
  # access Firestore/Storage. Create the secret in Firebase console first.
  # - variable: FIREBASE_SERVICE_ACCOUNT_JSON
  #   secret: firebaseServiceAccountJson
