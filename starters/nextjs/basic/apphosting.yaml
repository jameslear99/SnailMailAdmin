# Firebase App Hosting config for Snail Mail Admin.
# See https://firebase.google.com/docs/app-hosting/configure
#
# Explicit NEXT_PUBLIC_* values ensure browser auth uses snailmail-app even when
# App Hosting auto-injects FIREBASE_WEBAPP_CONFIG from another linked web app.

runConfig:
  minInstances: 0

env:
  - variable: FIREBASE_STORAGE_BUCKET
    value: snailmail-app.firebasestorage.app
    availability:
      - RUNTIME

  # Same secret as Cloud Functions `processLobAutoPrint` (firebase functions:secrets:set)
  - variable: LOB_AUTO_CRON_SECRET
    secret: LOB_AUTO_CRON_SECRET
    availability:
      - RUNTIME

  # Decrypts Lob API keys stored in Firestore (adminSecrets/lobApiCredentials)
  - variable: LOB_CREDENTIALS_ENCRYPTION_KEY
    secret: LOB_CREDENTIALS_ENCRYPTION_KEY
    availability:
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyD2z_pZjWM_BudS92n3gR7cLpaKfVA_7U8
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: snailmail-app.firebaseapp.com
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: snailmail-app
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: snailmail-app.firebasestorage.app
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "93210149746"
    availability:
      - BUILD

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:93210149746:web:83472d677afb07b0d113eb
    availability:
      - BUILD
